AWSTemplateFormatVersion: '2010-09-09'
Description: Funds Service - EC2 + Docker Compose Deployment (Secure Version)

Resources:

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and App access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Application

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0c02fb55956c7d316
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: funds-service-instance

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          echo "=== Starting deployment ==="

          yum update -y

          # Docker
          amazon-linux-extras install docker -y
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # Docker Compose v1 (más compatible)
          curl -L https://github.com/docker/compose/releases/download/1.29.2/docker-compose-Linux-x86_64 \
            -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          docker-compose version

          # Git
          yum install git -y

          # App
          cd /home/ec2-user
          rm -rf funds-management-service

          git clone https://github.com/leonardo1317/funds-management-service.git
          cd funds-management-service

          docker-compose up -d --build

          echo "=== DONE ==="

Outputs:

  PublicIP:
    Description: Public IP of EC2 instance
    Value: !GetAtt EC2Instance.PublicIp

  ApplicationURL:
    Description: URL to access application
    Value: !Sub http://${EC2Instance.PublicIp}:8080