openapi: 3.0.0
info:
  title: API de Fondos de Inversión
  description: |
    Especificación completa que integra Java Records, persistencia de datos y reglas de negocio.
    Todos los endpoints POST requieren `idempotency-Key`. 
    Las operaciones de cliente requieren `X-Client-Id`.
  version: 1.0.4

servers:
  - url: http://localhost:8080/v1

components:
  parameters:
    IdempotencyKeyHeader:
      name: idempotency-Key
      in: header
      required: true
      description: Clave única (String) enviada por el cliente para evitar duplicidad.
      schema:
        type: string
        example: "REQ-2026-04-09-XYZ"

    XClientIdHeader:
      name: X-Client-Id
      in: header
      required: true
      description: Identificador UUID del cliente autenticado.
      schema:
        type: string
        format: uuid
        example: "1e9f2556-1cec-44cd-8142-37de6f16a4da"

  schemas:
    # --- REQUEST SCHEMAS ---
    CreateClientRequest:
      type: object
      required: [fullName, email, phone]
      properties:
        fullName: { type: string, example: "Leonardo Romero" }
        email: { type: string, format: email, example: "leo@example.com" }
        phone: { type: string, example: "+573001234567" }
        notificationChannels: { type: array, items: { type: string }, example: ["email", "sms"] }

    CreateFundRequest:
      type: object
      required: [name, minimumAmount, category]
      properties:
        name: { type: string, example: "FPV_BTG_PACTUAL_ECOPETROL" }
        minimumAmount: { type: number, format: decimal, example: 125000 }
        category: { type: string, example: "FPV" }

    SubscribeRequest:
      type: object
      required: [fundId, amount]
      properties:
        fundId: { type: string, format: uuid, example: "3a75eef8-1f7c-40a7-870f-32f36222f051" }
        amount: { type: number, format: decimal, example: 125000 }

    # --- RESPONSE SCHEMAS (Basados en Java Records) ---
    ClientResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        email: { type: string }
        phone: { type: string }
        balance: { type: number, format: decimal, example: 500000 }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
        createdAt: { type: string, format: date-time }

    FundResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        minimumAmount: { type: number }
        category: { type: string }
        status: { type: string }

    SubscriptionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        clientId: { type: string, format: uuid }
        fundId: { type: string, format: uuid }
        amount: { type: number }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    TransactionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        clientId: { type: string, format: uuid }
        fundId: { type: string, format: uuid }
        fundName: { type: string }
        type: { type: string, enum: [SUBSCRIPTION, CANCELLATION] }
        movementType: { type: string, enum: [DEBIT, CREDIT] }
        amount: { type: number }
        balanceBefore: { type: number }
        balanceAfter: { type: number }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    PageResponseTransaction:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/TransactionResponse' } }
        pagination:
          type: object
          properties:
            offset: { type: integer, example: 0 }
            limit: { type: integer, example: 20 }
            total: { type: integer, example: 2 }

paths:
  /clients:
    post:
      summary: Create Client
      tags: [Client]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKeyHeader' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateClientRequest' }
      responses:
        '201':
          description: Cliente creado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientResponse' }

  /funds:
    post:
      summary: Create Fund
      tags: [Fund]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKeyHeader' }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFundRequest' }
      responses:
        '201':
          description: Fondo creado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FundResponse' }
  /subscriptions:
    post:
      summary: Subscribe to Fund
      tags: [Subscription]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/XClientIdHeader'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscribeRequest' }
      responses:
        '201':
          description: Suscripción realizada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubscriptionResponse' }

  /subscriptions/{subscriptionId}/cancel:
    post:
      summary: Cancel Subscription
      tags: [ Subscription ]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/XClientIdHeader'
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false # Hecho opcional por si solo se desea ejecutar la acción
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Cliente solicita cancelación"
      responses:
        '200':
          description: Suscripción cancelada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'

  /transactions:
    get:
      summary: Retrieve Transactions
      tags: [Transaction]
      parameters:
        - $ref: '#/components/parameters/XClientIdHeader'
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Listado de transacciones.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageResponseTransaction' }